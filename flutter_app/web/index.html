<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PlayPass">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PlayPass</title>
  <link rel="manifest" href="manifest.json">

  <!-- Yandex Maps JS API v2.1 (free, no key needed for dev) -->
  <script src="https://api-maps.yandex.ru/2.1/?apikey=&lang=ru_RU" type="text/javascript"></script>

  <style>
    body { margin: 0; background: #0F0F1A; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #0F0F1A;
      color: #6366F1; font-family: sans-serif; gap: 16px; z-index: 9999;
    }
    #loading .spinner {
      width: 40px; height: 40px; border: 3px solid #6366F120;
      border-top-color: #6366F1; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #9CA3AF; font-size: 14px; margin: 0; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Загрузка PlayPass...</p>
  </div>
  <script>
    // Force unregister ALL old service workers to prevent stale cache
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        registrations.forEach(function(reg) {
          reg.unregister();
          console.log('[PlayPass] Unregistered stale service worker');
        });
      });
      // Also clear all caches
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(name) {
            caches.delete(name);
            console.log('[PlayPass] Deleted cache:', name);
          });
        });
      }
    }

    // Hide loading screen once Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    });

    // Fallback: hide loading after 20s even if Flutter didn't fire event
    setTimeout(function() {
      var el = document.getElementById('loading');
      if (el && el.style.display !== 'none') {
        el.innerHTML = '<p style="color:#EF4444;font-size:16px;">Ошибка загрузки. Очистите кэш браузера и перезагрузите страницу.</p>';
      }
    }, 20000);

    // Global error catcher
    window.onerror = function(msg, src, line, col, err) {
      console.error('[PlayPass crash]', msg, src, line, err);
    };
    window.addEventListener('unhandledrejection', function(e) {
      console.error('[PlayPass unhandled promise]', e.reason);
    });
  </script>

  <!-- Yandex Maps interop for Flutter (with ObjectManager clustering for performance) -->
  <script>
    window._ymapInstance = null;
    window._ymapObjectManager = null;
    window._ymapMarkerClickCb = null;
    window._ymapClickQueue = [];
    window._ymapReady = false;
    // SVG icon cache: same occupancy%+tier+isOpen → same SVG data URI
    window._ymapIconCache = {};

    window.initYandexMap = function(containerId) {
      console.log('[YMap] initYandexMap called for:', containerId);

      if (typeof ymaps === 'undefined') {
        console.error('[YMap] ymaps not loaded');
        return;
      }

      ymaps.ready(function() {
        var container = document.getElementById(containerId);
        if (!container) {
          console.error('[YMap] container not found:', containerId);
          return;
        }

        container.style.width = '100%';
        container.style.height = '100%';

        var map = new ymaps.Map(containerId, {
          center: [41.2995, 69.2401],
          zoom: 12,
          controls: ['zoomControl']
        }, {
          // Disable search/route controls to reduce weight
          suppressMapOpenBlock: true,
        });

        // Create ObjectManager with clustering — handles 100s of markers efficiently
        var om = new ymaps.ObjectManager({
          clusterize: true,
          gridSize: 64,             // cluster cell in pixels
          clusterDisableClickZoom: false, // click cluster = zoom in
          geoObjectOpenBalloonOnClick: false, // we handle click in JS
          // Preset cluster icon color
          clusterIconLayout: 'default#pieChart',
          clusterIconPieChartRadius: 20,
          clusterIconPieChartCoreRadius: 12,
          clusterIconPieChartStrokeWidth: 2,
        });

        window._ymapInstance = map;
        window._ymapObjectManager = om;
        map.geoObjects.add(om);

        // Delegated click on any object in the manager
        om.objects.events.add('click', function(e) {
          var objId = e.get('objectId');
          var obj = om.objects.getById(objId);
          if (obj && obj.properties && obj.properties.clubId) {
            window._ymapClickQueue.push(obj.properties.clubId);
            if (window._ymapMarkerClickCb) window._ymapMarkerClickCb(obj.properties.clubId);
          }
        });

        window._ymapReady = true;
        console.log('[YMap] map initialized with ObjectManager clustering');
      });
    };

    // Build an SVG icon with caching based on state (no % label — just gamepad icon)
    window._buildMarkerIcon = function(pct, hasCapacity, isVip, isOpen) {
      var key = 'v2_' + isVip + '_' + isOpen;
      if (window._ymapIconCache[key]) return window._ymapIconCache[key];

      // Unified brand color for all markers (purple)
      var fillColor = '#7C3AED';
      var borderColor = isVip ? '#FBBF24' : 'white';
      var borderWidth = isVip ? 3 : 2;
      var svgSize = 40, r = 16, cx = 20, cy = 20;

      // Gamepad glyph (white) centered in the circle
      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + svgSize + '" height="' + svgSize + '">' +
        '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="' + fillColor + '" stroke="' + borderColor + '" stroke-width="' + borderWidth + '"/>' +
        // Material "sports_esports" simplified gamepad
        '<path d="M13.5 19.5 h-2 v-2 h-1 v2 h-2 v1 h2 v2 h1 v-2 h2 z M20 20 a1 1 0 1 1 -2 0 a1 1 0 0 1 2 0 z M22.5 18 a1 1 0 1 1 -2 0 a1 1 0 0 1 2 0 z M20.5 22 a1 1 0 1 1 -2 0 a1 1 0 0 1 2 0 z M24 16.5 a1 1 0 1 1 -2 0 a1 1 0 0 1 2 0 z" fill="white"/>';
      if (isOpen) {
        svg += '<circle cx="' + (svgSize - 6) + '" cy="6" r="4" fill="#22C55E" stroke="white" stroke-width="1.5"/>';
      }
      svg += '</svg>';
      var uri = 'data:image/svg+xml,' + encodeURIComponent(svg);
      window._ymapIconCache[key] = uri;
      return uri;
    };

    window.addClubMarkers = function(markersJson) {
      if (!window._ymapObjectManager || !window._ymapReady) {
        console.warn('[YMap] map not ready, retrying in 500ms');
        setTimeout(function() { window.addClubMarkers(markersJson); }, 500);
        return;
      }

      var markers;
      try { markers = JSON.parse(markersJson); }
      catch(e) { console.error('[YMap] JSON parse error:', e); return; }

      console.log('[YMap] adding', markers.length, 'markers via ObjectManager');

      // Clear previous features
      window._ymapObjectManager.removeAll();

      // Build GeoJSON feature collection — faster than per-marker add
      var features = [];
      for (var i = 0; i < markers.length; i++) {
        var m = markers[i];
        var pct = m.occupancyPct || 0;
        var hasCapacity = m.capacity > 0;
        var isVip = m.tier === 'vip';
        var iconUri = window._buildMarkerIcon(pct, hasCapacity, isVip, m.isOpen);

        features.push({
          type: 'Feature',
          id: i,
          geometry: { type: 'Point', coordinates: [m.lat, m.lon] },
          properties: {
            clubId: m.id,
            hintContent: m.name,
            balloonContent: '<strong>' + m.name + '</strong>',
          },
          options: {
            iconLayout: 'default#image',
            iconImageHref: iconUri,
            iconImageSize: [40, 40],
            iconImageOffset: [-20, -20],
            opacity: m.isOpen ? 1.0 : 0.5,
          }
        });
      }

      window._ymapObjectManager.add({
        type: 'FeatureCollection',
        features: features
      });
    };

    window.clearClubMarkers = function() {
      if (window._ymapObjectManager) window._ymapObjectManager.removeAll();
    };

    window.setMarkerClickCallback = function(cb) {
      window._ymapMarkerClickCb = cb;
    };

    window.panToClub = function(lat, lon) {
      if (!window._ymapInstance) return;
      window._ymapInstance.setCenter([lat, lon], 15, { duration: 500 });
    };

    // Locate user via browser geolocation, pan map and show blue dot
    window._ymapUserMark = null;
    window.locateUser = function() {
      if (!window._ymapInstance) return;
      if (!navigator.geolocation) { console.warn('[YMap] geolocation not supported'); return; }
      navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;
        console.log('[YMap] user location:', lat, lon);
        window._ymapInstance.setCenter([lat, lon], 14, { duration: 500 });
        // Remove old user marker
        if (window._ymapUserMark) {
          try { window._ymapInstance.geoObjects.remove(window._ymapUserMark); } catch(e) {}
        }
        // Blue pulsing dot SVG
        var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24">' +
          '<circle cx="12" cy="12" r="8" fill="#3B82F6" opacity="0.25"/>' +
          '<circle cx="12" cy="12" r="5" fill="#3B82F6" stroke="white" stroke-width="2"/>' +
          '</svg>';
        window._ymapUserMark = new ymaps.Placemark([lat, lon], {
          hintContent: 'Вы здесь'
        }, {
          iconLayout: 'default#image',
          iconImageHref: 'data:image/svg+xml,' + encodeURIComponent(svg),
          iconImageSize: [24, 24],
          iconImageOffset: [-12, -12]
        });
        window._ymapInstance.geoObjects.add(window._ymapUserMark);
        // Store position for Dart
        window._ymapUserLat = lat;
        window._ymapUserLon = lon;
      }, function(err) {
        console.warn('[YMap] geolocation error:', err.message);
      }, { enableHighAccuracy: false, timeout: 10000 });
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
