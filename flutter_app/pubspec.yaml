name: gamepass_uz
description: PlayPass — Gaming Club Subscription App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase — backend, auth, realtime
  supabase_flutter: ^2.3.4

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # QR scanner
  mobile_scanner: ^5.1.1

  # QR generator (for PDF poster)
  qr_flutter: ^4.1.0

  # PDF generation
  pdf: ^3.10.8
  printing: ^5.12.0

  # HTTP
  dio: ^5.4.3+1

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Lottie animations
  lottie: ^3.1.0

  # Image picker & cached images
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # Push notifications
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  permission_handler: ^11.3.1
  geolocator: ^11.1.0
  crypto: ^3.0.3

  # Web
  web: ^0.5.1

  # UI
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
