<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PlayPass">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PlayPass</title>
  <link rel="manifest" href="manifest.json">

  <!-- Yandex Maps JS API v2.1 — async so First Paint isn't blocked.
       Map widget polls window._ymapReady (set in initYandexMap callback)
       before drawing markers, so race conditions are handled. -->
  <script src="https://api-maps.yandex.ru/2.1/?apikey=&lang=ru_RU" type="text/javascript" defer></script>

  <style>
    body {
      margin: 0;
      background: #070C18;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Branded splash screen with floating gradient orbs */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(circle at 80% 20%, rgba(0, 71, 151, 0.18), transparent 50%),
                  radial-gradient(circle at 20% 80%, rgba(77, 141, 240, 0.12), transparent 50%),
                  #050510;
      gap: 28px; z-index: 9999;
      overflow: hidden;
    }

    /* Floating decorative orbs */
    #loading::before, #loading::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      animation: float 12s ease-in-out infinite;
      pointer-events: none;
    }
    #loading::before {
      width: 280px; height: 280px;
      background: rgba(0, 71, 151, 0.25);
      top: 10%; right: -80px;
    }
    #loading::after {
      width: 240px; height: 240px;
      background: rgba(77, 141, 240, 0.20);
      bottom: 12%; left: -60px;
      animation-delay: -6s;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-30px) translateX(20px); }
    }

    /* Logo block with pulsing gradient */
    #loading .logo-wrap {
      width: 96px; height: 96px;
      border-radius: 24px;
      background: linear-gradient(135deg, #004797 0%, #1E5BC6 50%, #4D8DF0 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 40px rgba(0, 71, 151, 0.4),
                  0 0 0 0 rgba(0, 71, 151, 0.6);
      animation: glow 2s ease-in-out infinite;
      position: relative; z-index: 1;
    }
    #loading .logo-wrap img {
      width: 64px; height: 64px;
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 12px 40px rgba(0, 71, 151, 0.4), 0 0 0 0 rgba(0, 71, 151, 0.6); }
      50% { box-shadow: 0 12px 60px rgba(0, 71, 151, 0.6), 0 0 0 16px rgba(0, 71, 151, 0); }
    }

    /* Wordmark — electric lime → soft blue (rebrand signature) */
    #loading .wordmark {
      font-size: 32px; font-weight: 900; letter-spacing: 6px;
      background: linear-gradient(90deg, #E6F945 0%, #BBD9FF 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      position: relative; z-index: 1;
    }

    /* Loading bar */
    #loading .progress {
      width: 160px; height: 3px;
      background: rgba(0, 71, 151, 0.15);
      border-radius: 3px;
      overflow: hidden;
      position: relative; z-index: 1;
    }
    #loading .progress-bar {
      width: 40%; height: 100%;
      background: linear-gradient(90deg, #004797, #4D8DF0);
      border-radius: 3px;
      animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    #loading p {
      color: #6B5F8A; font-size: 13px; margin: 0;
      letter-spacing: 1.5px; text-transform: uppercase;
      position: relative; z-index: 1;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo-wrap">
      <img src="icons/app-icon.svg" alt="PlayPass" />
    </div>
    <div class="wordmark">PLAYPASS</div>
    <div class="progress"><div class="progress-bar"></div></div>
    <p>Загрузка</p>
  </div>
  <script>
    // Force unregister ALL old service workers to prevent stale cache
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        registrations.forEach(function(reg) {
          reg.unregister();
          console.log('[PlayPass] Unregistered stale service worker');
        });
      });
      // Also clear all caches
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(name) {
            caches.delete(name);
            console.log('[PlayPass] Deleted cache:', name);
          });
        });
      }
    }

    // Hide loading screen once Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    });

    // Fallback: hide loading after 20s even if Flutter didn't fire event
    setTimeout(function() {
      var el = document.getElementById('loading');
      if (el && el.style.display !== 'none') {
        el.innerHTML = '<p style="color:#EF4444;font-size:16px;">Ошибка загрузки. Очистите кэш браузера и перезагрузите страницу.</p>';
      }
    }, 20000);

    // Global error catcher
    window.onerror = function(msg, src, line, col, err) {
      console.error('[PlayPass crash]', msg, src, line, err);
    };
    window.addEventListener('unhandledrejection', function(e) {
      console.error('[PlayPass unhandled promise]', e.reason);
    });
  </script>

  <!-- Yandex Maps interop for Flutter (with ObjectManager clustering for performance) -->
  <script>
    window._ymapInstance = null;
    window._ymapObjectManager = null;
    window._ymapMarkerClickCb = null;
    window._ymapClickQueue = [];
    window._ymapReady = false;
    // SVG icon cache: same occupancy%+tier+isOpen → same SVG data URI
    window._ymapIconCache = {};

    window.initYandexMap = function(containerId) {
      console.log('[YMap] initYandexMap called for:', containerId);

      // Yandex API is loaded with defer — may not be ready on first call.
      // Retry instead of failing.
      if (typeof ymaps === 'undefined') {
        setTimeout(function() { window.initYandexMap(containerId); }, 100);
        return;
      }

      ymaps.ready(function() {
        var container = document.getElementById(containerId);
        if (!container) {
          console.error('[YMap] container not found:', containerId);
          return;
        }

        container.style.width = '100%';
        container.style.height = '100%';

        var map = new ymaps.Map(containerId, {
          center: [41.2995, 69.2401],
          zoom: 12,
          controls: ['zoomControl']
        }, {
          // Disable search/route controls to reduce weight
          suppressMapOpenBlock: true,
        });

        // Create ObjectManager with clustering — handles 100s of markers efficiently
        var om = new ymaps.ObjectManager({
          clusterize: true,
          gridSize: 64,             // cluster cell in pixels
          clusterDisableClickZoom: false, // click cluster = zoom in
          // Preset cluster icon color
          clusterIconLayout: 'default#pieChart',
          clusterIconPieChartRadius: 20,
          clusterIconPieChartCoreRadius: 12,
          clusterIconPieChartStrokeWidth: 2,
        });

        window._ymapInstance = map;
        window._ymapObjectManager = om;
        map.geoObjects.add(om);

        // Disable default balloons on both markers and clusters.
        // We handle taps by pushing to _ymapClickQueue for Flutter bottom sheet.
        om.objects.options.set('openBalloonOnClick', false);
        om.objects.options.set('openEmptyBalloon', false);
        om.clusters.options.set('openBalloonOnClick', false);
        om.clusters.options.set('openEmptyBalloon', false);

        // Delegated click on any object in the manager
        om.objects.events.add('click', function(e) {
          var objId = e.get('objectId');
          var obj = om.objects.getById(objId);
          if (obj && obj.properties && obj.properties.clubId) {
            window._ymapClickQueue.push(obj.properties.clubId);
            if (window._ymapMarkerClickCb) window._ymapMarkerClickCb(obj.properties.clubId);
          }
        });

        window._ymapReady = true;
        console.log('[YMap] map initialized with ObjectManager clustering');
      });
    };

    // Build an SVG icon based on club type + live occupancy
    // occupancyPct: -1 = no data, 0-49 free (green), 50-79 busy (yellow), 80+ full (red)
    window._buildMarkerIcon = function(hasPc, hasPs, isVip, isOpen, occupancyPct) {
      if (!hasPc && !hasPs) hasPc = true;
      var mode = (hasPc && hasPs) ? 'both' : (hasPs ? 'ps' : 'pc');

      // Occupancy ring color
      var occColor = null;
      if (occupancyPct >= 0 && isOpen) {
        if (occupancyPct < 50) occColor = '#22C55E';      // green
        else if (occupancyPct < 80) occColor = '#F59E0B'; // yellow
        else occColor = '#EF4444';                         // red
      }

      var key = 'v4_' + mode + '_' + isVip + '_' + isOpen + '_' + (occColor || 'na');
      if (window._ymapIconCache[key]) return window._ymapIconCache[key];

      // Brand gradient inside the pin
      var gradId = 'g_' + key.replace(/[^a-z0-9]/gi, '');
      var gradStops = '<linearGradient id="' + gradId + '" x1="0%" y1="0%" x2="100%" y2="100%">' +
        '<stop offset="0%" stop-color="#004797"/>' +
        '<stop offset="100%" stop-color="#4D8DF0"/></linearGradient>';
      var fillFill = 'url(#' + gradId + ')';

      // Occupancy color overrides default white border; VIP gold has priority
      var borderColor = isVip ? '#FBBF24' : (occColor || '#FFFFFF');
      var borderWidth = (isVip || occColor) ? 2.5 : 2;

      // Pin geometry — Google Maps-style teardrop
      // Single icon: 44×56 (point at bottom). Dual: 64×56 capsule with bottom point
      var isWide = (mode === 'both');
      var width = isWide ? 64 : 44;
      var height = 56;

      // Pin path: rounded top + pointed bottom (anchor at center-bottom of viewport)
      var pinPath;
      if (isWide) {
        // Wider capsule pin for 'both' mode
        pinPath = 'M 8 4 Q 4 4 4 14 L 4 32 Q 4 42 14 42 L ' + (width - 14) +
          ' 42 Q ' + (width - 4) + ' 42 ' + (width - 4) + ' 32 L ' + (width - 4) +
          ' 14 Q ' + (width - 4) + ' 4 ' + (width - 8) + ' 4 Z ' +
          // Bottom point
          'M ' + (width / 2 - 6) + ' 42 L ' + (width / 2) + ' 54 L ' + (width / 2 + 6) + ' 42 Z';
      } else {
        // Standard teardrop pin
        pinPath = 'M 22 4 C 12 4 4 12 4 22 C 4 32 12 38 22 54 C 32 38 40 32 40 22 C 40 12 32 4 22 4 Z';
      }

      // Glyphs translate slightly UP so they're centered in the round head, not the tail
      function pcGlyph(tx, ty) {
        return '<g transform="translate(' + tx + ', ' + ty + ') scale(0.78)">' +
          '<rect x="2" y="3" width="20" height="14" rx="2" fill="none" stroke="white" stroke-width="2"/>' +
          '<line x1="8" y1="21" x2="16" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>' +
          '<line x1="12" y1="17" x2="12" y2="21" stroke="white" stroke-width="2"/>' +
          '</g>';
      }
      function psGlyph(tx, ty) {
        return '<g transform="translate(' + tx + ', ' + ty + ') scale(0.78)">' +
          '<path d="M 4 8 Q 4 3 9 3 L 15 3 Q 20 3 20 8 L 20 12 Q 20 17 15 17 L 14 14 L 10 14 L 9 17 Q 4 17 4 12 Z" ' +
          'fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>' +
          '<rect x="7" y="9" width="3" height="1.2" fill="white"/>' +
          '<rect x="8" y="8" width="1.2" height="3" fill="white"/>' +
          '<circle cx="15" cy="8.5" r="0.9" fill="white"/>' +
          '<circle cx="16.5" cy="10" r="0.9" fill="white"/>' +
          '<circle cx="15" cy="11.5" r="0.9" fill="white"/>' +
          '<circle cx="13.5" cy="10" r="0.9" fill="white"/>' +
          '</g>';
      }

      var content;
      if (mode === 'both') {
        // PC on the left, PS on the right, both in the head zone (y=8)
        content = pcGlyph(8, 8) + psGlyph(34, 8);
      } else if (mode === 'ps') {
        content = psGlyph(11, 7);
      } else {
        content = pcGlyph(11, 7);
      }

      // Drop shadow under the pin
      var shadow = '<ellipse cx="' + (width / 2) + '" cy="' + (height - 1) +
        '" rx="6" ry="2" fill="rgba(0,0,0,0.25)"/>';

      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + width + '" height="' + height + '">' +
        '<defs>' + gradStops + '</defs>' +
        shadow +
        '<path d="' + pinPath + '" fill="' + fillFill +
        '" stroke="' + borderColor + '" stroke-width="' + borderWidth + '" stroke-linejoin="round"/>' +
        content;

      if (isOpen) {
        // Green "open now" dot in top-right of the head
        svg += '<circle cx="' + (width - 8) + '" cy="8" r="4" fill="#22C55E" stroke="white" stroke-width="1.5"/>';
      }
      svg += '</svg>';

      var uri = 'data:image/svg+xml,' + encodeURIComponent(svg);
      window._ymapIconCache[key] = { uri: uri, width: width, height: height };
      return window._ymapIconCache[key];
    };

    window.addClubMarkers = function(markersJson) {
      if (!window._ymapObjectManager || !window._ymapReady) {
        console.warn('[YMap] map not ready, retrying in 500ms');
        setTimeout(function() { window.addClubMarkers(markersJson); }, 500);
        return;
      }

      var markers;
      try { markers = JSON.parse(markersJson); }
      catch(e) { console.error('[YMap] JSON parse error:', e); return; }

      console.log('[YMap] adding', markers.length, 'markers via ObjectManager');

      // Clear previous features
      window._ymapObjectManager.removeAll();

      // Build GeoJSON feature collection — faster than per-marker add
      var features = [];
      for (var i = 0; i < markers.length; i++) {
        var m = markers[i];
        var isVip = m.tier === 'vip';
        var occPct = (typeof m.occupancyPct === 'number') ? m.occupancyPct : -1;
        var icon = window._buildMarkerIcon(m.hasPc, m.hasPs, isVip, m.isOpen, occPct);

        // Hint shows occupancy ratio when known
        var hint = m.name;
        if (occPct >= 0 && m.pcCount > 0) {
          hint += ' • ' + (m.occupied || 0) + '/' + m.pcCount;
        }

        features.push({
          type: 'Feature',
          id: i,
          geometry: { type: 'Point', coordinates: [m.lat, m.lon] },
          properties: {
            clubId: m.id,
            hintContent: hint,
          },
          options: {
            iconLayout: 'default#image',
            iconImageHref: icon.uri,
            iconImageSize: [icon.width, icon.height],
            // Pin tip is at the bottom-center, so anchor there (not center)
            iconImageOffset: [-icon.width / 2, -(icon.height - 2)],
            opacity: m.isOpen ? 1.0 : 0.5,
            // Redundant safety: disable balloon per-feature too
            openBalloonOnClick: false,
            openEmptyBalloon: false,
          }
        });
      }

      window._ymapObjectManager.add({
        type: 'FeatureCollection',
        features: features
      });
    };

    window.clearClubMarkers = function() {
      if (window._ymapObjectManager) window._ymapObjectManager.removeAll();
    };

    window.setMarkerClickCallback = function(cb) {
      window._ymapMarkerClickCb = cb;
      // Flush any clicks that landed before Dart registered the callback.
      // (Dart used to poll _ymapClickQueue every 500ms — we now push them
      //  out synchronously the moment a real callback is hooked up.)
      if (cb && window._ymapClickQueue && window._ymapClickQueue.length) {
        var q = window._ymapClickQueue;
        window._ymapClickQueue = [];
        for (var i = 0; i < q.length; i++) {
          try { cb(q[i]); } catch (e) { console.warn('[YMap] click cb threw:', e); }
        }
      }
    };

    window.panToClub = function(lat, lon) {
      if (!window._ymapInstance) return;
      window._ymapInstance.setCenter([lat, lon], 15, { duration: 500 });
    };

    // Locate user via browser geolocation, pan map and show blue dot
    window._ymapUserMark = null;
    window._ymapLocateError = null;
    window.clearYmapIconCache = function() {
      window._ymapIconCache = {};
    };
    window.locateUser = function() {
      window._ymapLocateError = null;
      if (!window._ymapInstance) return;
      if (!navigator.geolocation) { console.warn('[YMap] geolocation not supported'); return; }
      navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;
        console.log('[YMap] user location:', lat, lon);
        window._ymapInstance.setCenter([lat, lon], 14, { duration: 500 });
        // Remove old user marker
        if (window._ymapUserMark) {
          try { window._ymapInstance.geoObjects.remove(window._ymapUserMark); } catch(e) {}
        }
        // Blue pulsing dot SVG
        var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24">' +
          '<circle cx="12" cy="12" r="8" fill="#3B82F6" opacity="0.25"/>' +
          '<circle cx="12" cy="12" r="5" fill="#3B82F6" stroke="white" stroke-width="2"/>' +
          '</svg>';
        window._ymapUserMark = new ymaps.Placemark([lat, lon], {
          hintContent: 'Вы здесь'
        }, {
          iconLayout: 'default#image',
          iconImageHref: 'data:image/svg+xml,' + encodeURIComponent(svg),
          iconImageSize: [24, 24],
          iconImageOffset: [-12, -12]
        });
        window._ymapInstance.geoObjects.add(window._ymapUserMark);
        // Store position for Dart
        window._ymapUserLat = lat;
        window._ymapUserLon = lon;
      }, function(err) {
        console.warn('[YMap] geolocation error:', err.message);
        window._ymapLocateError = err.message || 'Geolocation failed';
      }, { enableHighAccuracy: false, timeout: 10000 });
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
