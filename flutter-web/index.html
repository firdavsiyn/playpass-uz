<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PlayPass">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PlayPass</title>
  <link rel="manifest" href="manifest.json">

  <!-- Yandex Maps JS API v2.1 (free, no key needed for dev) -->
  <script src="https://api-maps.yandex.ru/2.1/?apikey=&lang=ru_RU" type="text/javascript"></script>

  <style>
    body { margin: 0; background: #0F0F1A; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #0F0F1A;
      color: #6366F1; font-family: sans-serif; gap: 16px; z-index: 9999;
    }
    #loading .spinner {
      width: 40px; height: 40px; border: 3px solid #6366F120;
      border-top-color: #6366F1; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #9CA3AF; font-size: 14px; margin: 0; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Загрузка PlayPass...</p>
  </div>
  <script>
    // Force unregister ALL old service workers to prevent stale cache
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        registrations.forEach(function(reg) {
          reg.unregister();
          console.log('[PlayPass] Unregistered stale service worker');
        });
      });
      // Also clear all caches
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(name) {
            caches.delete(name);
            console.log('[PlayPass] Deleted cache:', name);
          });
        });
      }
    }

    // Hide loading screen once Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    });

    // Fallback: hide loading after 20s even if Flutter didn't fire event
    setTimeout(function() {
      var el = document.getElementById('loading');
      if (el && el.style.display !== 'none') {
        el.innerHTML = '<p style="color:#EF4444;font-size:16px;">Ошибка загрузки. Очистите кэш браузера и перезагрузите страницу.</p>';
      }
    }, 20000);

    // Global error catcher
    window.onerror = function(msg, src, line, col, err) {
      console.error('[PlayPass crash]', msg, src, line, err);
    };
    window.addEventListener('unhandledrejection', function(e) {
      console.error('[PlayPass unhandled promise]', e.reason);
    });
  </script>

  <!-- Yandex Maps interop for Flutter (with ObjectManager clustering for performance) -->
  <script>
    window._ymapInstance = null;
    window._ymapObjectManager = null;
    window._ymapMarkerClickCb = null;
    window._ymapClickQueue = [];
    window._ymapReady = false;
    // SVG icon cache: same occupancy%+tier+isOpen → same SVG data URI
    window._ymapIconCache = {};

    window.initYandexMap = function(containerId) {
      console.log('[YMap] initYandexMap called for:', containerId);

      if (typeof ymaps === 'undefined') {
        console.error('[YMap] ymaps not loaded');
        return;
      }

      ymaps.ready(function() {
        var container = document.getElementById(containerId);
        if (!container) {
          console.error('[YMap] container not found:', containerId);
          return;
        }

        container.style.width = '100%';
        container.style.height = '100%';

        var map = new ymaps.Map(containerId, {
          center: [41.2995, 69.2401],
          zoom: 12,
          controls: ['zoomControl']
        }, {
          // Disable search/route controls to reduce weight
          suppressMapOpenBlock: true,
        });

        // Create ObjectManager with clustering — handles 100s of markers efficiently
        var om = new ymaps.ObjectManager({
          clusterize: true,
          gridSize: 64,             // cluster cell in pixels
          clusterDisableClickZoom: false, // click cluster = zoom in
          // Preset cluster icon color
          clusterIconLayout: 'default#pieChart',
          clusterIconPieChartRadius: 20,
          clusterIconPieChartCoreRadius: 12,
          clusterIconPieChartStrokeWidth: 2,
        });

        window._ymapInstance = map;
        window._ymapObjectManager = om;
        map.geoObjects.add(om);

        // Disable default balloons on both markers and clusters.
        // We handle taps by pushing to _ymapClickQueue for Flutter bottom sheet.
        om.objects.options.set('openBalloonOnClick', false);
        om.objects.options.set('openEmptyBalloon', false);
        om.clusters.options.set('openBalloonOnClick', false);
        om.clusters.options.set('openEmptyBalloon', false);

        // Delegated click on any object in the manager
        om.objects.events.add('click', function(e) {
          var objId = e.get('objectId');
          var obj = om.objects.getById(objId);
          if (obj && obj.properties && obj.properties.clubId) {
            window._ymapClickQueue.push(obj.properties.clubId);
            if (window._ymapMarkerClickCb) window._ymapMarkerClickCb(obj.properties.clubId);
          }
        });

        window._ymapReady = true;
        console.log('[YMap] map initialized with ObjectManager clustering');
      });
    };

    // Build an SVG icon based on club type + live occupancy
    // occupancyPct: -1 = no data, 0-49 free (green), 50-79 busy (yellow), 80+ full (red)
    window._buildMarkerIcon = function(hasPc, hasPs, isVip, isOpen, occupancyPct) {
      if (!hasPc && !hasPs) hasPc = true;
      var mode = (hasPc && hasPs) ? 'both' : (hasPs ? 'ps' : 'pc');

      // Occupancy ring color
      var occColor = null;
      if (occupancyPct >= 0 && isOpen) {
        if (occupancyPct < 50) occColor = '#22C55E';      // green
        else if (occupancyPct < 80) occColor = '#F59E0B'; // yellow
        else occColor = '#EF4444';                         // red
      }

      var key = 'v4_' + mode + '_' + isVip + '_' + isOpen + '_' + (occColor || 'na');
      if (window._ymapIconCache[key]) return window._ymapIconCache[key];

      var fillColor = '#7C3AED'; // brand purple
      // Occupancy color overrides white border (VIP gold takes precedence)
      var borderColor = isVip ? '#FBBF24' : (occColor || 'white');
      var borderWidth = (isVip || occColor) ? 3 : 2;

      // Wider marker when showing both icons
      var isWide = (mode === 'both');
      var width = isWide ? 56 : 40;
      var height = 40;

      // Capsule-shaped background when wide, circle otherwise
      var bgShape;
      if (isWide) {
        bgShape = '<rect x="2" y="2" width="' + (width - 4) + '" height="' + (height - 4) +
          '" rx="18" ry="18" fill="' + fillColor + '" stroke="' + borderColor + '" stroke-width="' + borderWidth + '"/>';
      } else {
        bgShape = '<circle cx="20" cy="20" r="16" fill="' + fillColor +
          '" stroke="' + borderColor + '" stroke-width="' + borderWidth + '"/>';
      }

      // Desktop/monitor glyph (for PC) — scaled to ~20×20 in viewBox 24×24
      // Translated to position inside the marker
      function pcGlyph(tx) {
        return '<g transform="translate(' + tx + ', 10) scale(0.83)">' +
          // Monitor body
          '<rect x="2" y="3" width="20" height="14" rx="2" fill="none" stroke="white" stroke-width="2"/>' +
          // Monitor stand
          '<line x1="8" y1="21" x2="16" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>' +
          '<line x1="12" y1="17" x2="12" y2="21" stroke="white" stroke-width="2"/>' +
          '</g>';
      }

      // Gamepad glyph (for PS) — simplified DualShock-ish
      function psGlyph(tx) {
        return '<g transform="translate(' + tx + ', 11) scale(0.83)">' +
          // Main body (rounded rectangle with two lobes)
          '<path d="M 4 8 Q 4 3 9 3 L 15 3 Q 20 3 20 8 L 20 12 Q 20 17 15 17 L 14 14 L 10 14 L 9 17 Q 4 17 4 12 Z" ' +
          'fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>' +
          // D-pad cross (left)
          '<rect x="7" y="9" width="3" height="1.2" fill="white"/>' +
          '<rect x="8" y="8" width="1.2" height="3" fill="white"/>' +
          // Buttons (right)
          '<circle cx="15" cy="8.5" r="0.9" fill="white"/>' +
          '<circle cx="16.5" cy="10" r="0.9" fill="white"/>' +
          '<circle cx="15" cy="11.5" r="0.9" fill="white"/>' +
          '<circle cx="13.5" cy="10" r="0.9" fill="white"/>' +
          '</g>';
      }

      var content;
      if (mode === 'both') {
        // PC on the left, PS on the right, separated
        content = pcGlyph(6) + psGlyph(30);
      } else if (mode === 'ps') {
        content = psGlyph(10);
      } else {
        content = pcGlyph(10);
      }

      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + width + '" height="' + height + '">' +
        bgShape + content;
      if (isOpen) {
        svg += '<circle cx="' + (width - 6) + '" cy="6" r="4" fill="#22C55E" stroke="white" stroke-width="1.5"/>';
      }
      svg += '</svg>';

      var uri = 'data:image/svg+xml,' + encodeURIComponent(svg);
      window._ymapIconCache[key] = { uri: uri, width: width, height: height };
      return window._ymapIconCache[key];
    };

    window.addClubMarkers = function(markersJson) {
      if (!window._ymapObjectManager || !window._ymapReady) {
        console.warn('[YMap] map not ready, retrying in 500ms');
        setTimeout(function() { window.addClubMarkers(markersJson); }, 500);
        return;
      }

      var markers;
      try { markers = JSON.parse(markersJson); }
      catch(e) { console.error('[YMap] JSON parse error:', e); return; }

      console.log('[YMap] adding', markers.length, 'markers via ObjectManager');

      // Clear previous features
      window._ymapObjectManager.removeAll();

      // Build GeoJSON feature collection — faster than per-marker add
      var features = [];
      for (var i = 0; i < markers.length; i++) {
        var m = markers[i];
        var isVip = m.tier === 'vip';
        var occPct = (typeof m.occupancyPct === 'number') ? m.occupancyPct : -1;
        var icon = window._buildMarkerIcon(m.hasPc, m.hasPs, isVip, m.isOpen, occPct);

        // Hint shows occupancy ratio when known
        var hint = m.name;
        if (occPct >= 0 && m.pcCount > 0) {
          hint += ' • ' + (m.occupied || 0) + '/' + m.pcCount;
        }

        features.push({
          type: 'Feature',
          id: i,
          geometry: { type: 'Point', coordinates: [m.lat, m.lon] },
          properties: {
            clubId: m.id,
            hintContent: hint,
          },
          options: {
            iconLayout: 'default#image',
            iconImageHref: icon.uri,
            iconImageSize: [icon.width, icon.height],
            iconImageOffset: [-icon.width / 2, -icon.height / 2],
            opacity: m.isOpen ? 1.0 : 0.5,
            // Redundant safety: disable balloon per-feature too
            openBalloonOnClick: false,
            openEmptyBalloon: false,
          }
        });
      }

      window._ymapObjectManager.add({
        type: 'FeatureCollection',
        features: features
      });
    };

    window.clearClubMarkers = function() {
      if (window._ymapObjectManager) window._ymapObjectManager.removeAll();
    };

    window.setMarkerClickCallback = function(cb) {
      window._ymapMarkerClickCb = cb;
    };

    window.panToClub = function(lat, lon) {
      if (!window._ymapInstance) return;
      window._ymapInstance.setCenter([lat, lon], 15, { duration: 500 });
    };

    // Locate user via browser geolocation, pan map and show blue dot
    window._ymapUserMark = null;
    window._ymapLocateError = null;
    window.clearYmapIconCache = function() {
      window._ymapIconCache = {};
    };
    window.locateUser = function() {
      window._ymapLocateError = null;
      if (!window._ymapInstance) return;
      if (!navigator.geolocation) { console.warn('[YMap] geolocation not supported'); return; }
      navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;
        console.log('[YMap] user location:', lat, lon);
        window._ymapInstance.setCenter([lat, lon], 14, { duration: 500 });
        // Remove old user marker
        if (window._ymapUserMark) {
          try { window._ymapInstance.geoObjects.remove(window._ymapUserMark); } catch(e) {}
        }
        // Blue pulsing dot SVG
        var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24">' +
          '<circle cx="12" cy="12" r="8" fill="#3B82F6" opacity="0.25"/>' +
          '<circle cx="12" cy="12" r="5" fill="#3B82F6" stroke="white" stroke-width="2"/>' +
          '</svg>';
        window._ymapUserMark = new ymaps.Placemark([lat, lon], {
          hintContent: 'Вы здесь'
        }, {
          iconLayout: 'default#image',
          iconImageHref: 'data:image/svg+xml,' + encodeURIComponent(svg),
          iconImageSize: [24, 24],
          iconImageOffset: [-12, -12]
        });
        window._ymapInstance.geoObjects.add(window._ymapUserMark);
        // Store position for Dart
        window._ymapUserLat = lat;
        window._ymapUserLon = lon;
      }, function(err) {
        console.warn('[YMap] geolocation error:', err.message);
        window._ymapLocateError = err.message || 'Geolocation failed';
      }, { enableHighAccuracy: false, timeout: 10000 });
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
